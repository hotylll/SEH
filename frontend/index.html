<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>信息收集整合系统</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --line: #d9dee8;
      --text: #172033;
      --muted: #697386;
      --primary: #2563eb;
      --success: #15803d;
      --warning: #b45309;
      --danger: #b91c1c;
      --neutral: #475569;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      letter-spacing: 0;
    }
    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-size: 18px; font-weight: 700; }
    .api-box { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    main { max-width: 1280px; margin: 0 auto; padding: 20px 24px 36px; }
    nav {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    button, input, select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
    }
    button { cursor: pointer; white-space: nowrap; }
    button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    button.ghost.active { background: #e8efff; border-color: #9bb8ff; color: #1747a6; }
    button:disabled { cursor: not-allowed; opacity: .55; }
    input, select { min-width: 0; }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols { grid-template-columns: minmax(0, 1.4fr) minmax(320px, .9fr); align-items: start; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.3;
    }
    .stat-label { color: var(--muted); font-size: 12px; }
    .stat-value { margin-top: 6px; font-size: 26px; font-weight: 700; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #edf0f5;
      text-align: left;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th { color: var(--muted); font-size: 12px; font-weight: 600; background: #fafbfe; }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 24px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .up, .surge { color: var(--success); background: #e9f7ef; }
    .stable { color: var(--neutral); background: #eef2f7; }
    .down, .plunge { color: var(--danger); background: #fdecec; }
    .bar-row { display: grid; grid-template-columns: 92px 1fr 52px; gap: 8px; align-items: center; margin: 10px 0; }
    .bar-track { height: 12px; background: #edf1f7; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--primary); border-radius: 999px; min-width: 2px; }
    .form-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; }
    .wide-2 { grid-column: span 2; }
    .wide-3 { grid-column: span 3; }
    .view { display: none; }
    .view.active { display: block; }
    .muted { color: var(--muted); }
    .error { color: var(--danger); }
    .action-btn {
      height: 28px;
      padding: 0 8px;
      color: var(--primary);
      border-color: #b8cbff;
      background: #f5f8ff;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 8px 12px;
      margin-bottom: 14px;
    }
    .detail-label { color: var(--muted); }
    .detail-value { word-break: break-word; }
    .modal[hidden] { display: none; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, .42);
    }
    .modal-panel {
      position: relative;
      width: min(920px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 54px rgba(15, 23, 42, .24);
      padding: 16px;
    }
    .modal-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .modal-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }
    .modal-head button { margin-left: auto; }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #172033;
      color: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .18);
      display: none;
    }
    .toast.show { display: block; }
    @media (max-width: 900px) {
      header { padding: 0 14px; }
      main { padding: 14px; }
      .stats, .cols, .form-grid { grid-template-columns: 1fr; }
      .wide-2, .wide-3 { grid-column: span 1; }
      table { min-width: 720px; }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">信息收集整合系统</div>
    <div class="api-box">
      <span>API</span>
      <input id="apiBase" value="http://127.0.0.1:8000" aria-label="API地址">
      <button id="saveApi">保存</button>
    </div>
  </header>

  <main>
    <nav>
      <button class="ghost active" data-view="dashboard">首页</button>
      <button class="ghost" data-view="trends">趋势分析</button>
      <button class="ghost" data-view="items">信息搜索</button>
      <button class="ghost" data-view="sources">数据源管理</button>
      <button class="ghost" data-view="reports">报表中心</button>
    </nav>

    <section id="dashboard" class="view active">
      <div class="grid stats">
        <div class="panel"><div class="stat-label">服务状态</div><div id="healthStatus" class="stat-value">-</div></div>
        <div class="panel"><div class="stat-label">热点主题</div><div id="topicCount" class="stat-value">0</div></div>
        <div class="panel"><div class="stat-label">信息总数</div><div id="itemCount" class="stat-value">0</div></div>
        <div class="panel"><div class="stat-label">数据源数</div><div id="sourceCount" class="stat-value">0</div></div>
      </div>
      <div class="grid cols" style="margin-top:14px">
        <div class="panel">
          <div class="toolbar">
            <h2 style="margin-right:auto">今日热点榜</h2>
            <button class="primary" id="refreshAll">刷新</button>
          </div>
          <div class="table-wrap"><table id="hotTable"></table></div>
        </div>
        <div class="panel">
          <h2>热度分布</h2>
          <div id="barChart"></div>
        </div>
      </div>
    </section>

    <section id="trends" class="view">
      <div class="panel">
        <div class="toolbar">
          <h2 style="margin-right:auto">趋势分析</h2>
          <select id="trendLimit"><option>10</option><option selected>20</option><option>50</option></select>
          <button id="loadTrends">刷新趋势</button>
        </div>
        <div class="table-wrap"><table id="trendTable"></table></div>
      </div>
    </section>

    <section id="items" class="view">
      <div class="panel">
        <div class="toolbar">
          <input id="keyword" placeholder="关键词">
          <input id="sourceId" placeholder="来源ID">
          <select id="itemLimit"><option>20</option><option selected>50</option><option>100</option></select>
          <button class="primary" id="searchItems">搜索</button>
        </div>
        <div class="table-wrap"><table id="itemTable"></table></div>
      </div>
    </section>

    <section id="sources" class="view">
      <div class="panel">
        <h2>新增数据源</h2>
        <div class="form-grid">
          <input id="srcName" class="wide-2" placeholder="名称">
          <select id="srcType"><option>news</option><option>forum</option><option>api</option><option>csv</option></select>
          <select id="srcSchedule"><option>manual</option><option>hourly</option><option>daily</option><option>weekly</option></select>
          <select id="srcStatus"><option>enabled</option><option>disabled</option></select>
          <input id="srcKeywords" class="wide-2" placeholder="关键词">
          <input id="srcEndpoint" class="wide-3" placeholder="endpoint">
          <button class="primary" id="createSource">保存</button>
        </div>
      </div>
      <div class="panel" style="margin-top:14px">
        <div class="toolbar">
          <h2 style="margin-right:auto">数据源列表</h2>
          <button id="loadSources">刷新数据源</button>
        </div>
        <div class="table-wrap"><table id="sourceTable"></table></div>
      </div>
    </section>

    <section id="reports" class="view">
      <div class="panel">
        <div class="toolbar">
          <h2 style="margin-right:auto">报表中心</h2>
          <select id="reportType"><option>summary</option><option>detail</option></select>
          <select id="reportFormat"><option>xlsx</option><option>pdf</option></select>
          <input id="generatedBy" value="组长" placeholder="生成人">
          <button class="primary" id="createReport">生成报表</button>
          <button id="loadReports">刷新记录</button>
        </div>
        <div id="reportResult" class="muted"></div>
        <div class="table-wrap" style="margin-top:12px"><table id="reportTable"></table></div>
      </div>
    </section>
  </main>
  <div id="detailModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">详情</h2>
        <button id="closeModal">关闭</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const state = { trends: [], items: [], sources: [], reports: [] };
    const apiInput = document.querySelector("#apiBase");
    const modal = document.querySelector("#detailModal");
    const modalTitle = document.querySelector("#modalTitle");
    const modalBody = document.querySelector("#modalBody");
    apiInput.value = localStorage.getItem("apiBase") || apiInput.value;

    function apiBase() { return apiInput.value.replace(/\/$/, ""); }
    function showToast(text) {
      const toast = document.querySelector("#toast");
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }
    async function request(path, options = {}) {
      const response = await fetch(apiBase() + path, options);
      const payload = await response.json();
      if (!response.ok || payload.code !== 0) throw new Error(payload.message || "请求失败");
      return payload.data;
    }
    function fillCell(cell, value) {
      if (value instanceof Node) {
        cell.appendChild(value);
        return;
      }
      const text = String(value ?? "-");
      cell.textContent = text;
      cell.title = text;
    }
    function buildTable(headers, rows) {
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      headers.forEach(header => {
        const th = document.createElement("th");
        th.textContent = header;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      if (!rows.length) {
        const emptyRow = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = headers.length;
        td.textContent = "暂无数据";
        emptyRow.appendChild(td);
        tbody.appendChild(emptyRow);
      } else {
        rows.forEach(row => {
          const tr = document.createElement("tr");
          row.forEach(value => {
            const td = document.createElement("td");
            fillCell(td, value);
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      }
      table.appendChild(tbody);
      return table;
    }
    function setTable(selector, headers, rows) {
      const table = document.querySelector(selector);
      const next = buildTable(headers, rows);
      next.id = selector.slice(1);
      table.replaceWith(next);
    }
    function trendBadge(direction) {
      const text = { surge: "突增", up: "上升", stable: "稳定", down: "下降", plunge: "骤降" }[direction] || direction;
      const badge = document.createElement("span");
      badge.className = `badge ${direction}`;
      badge.textContent = text;
      return badge;
    }
    function actionButton(label, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "action-btn";
      button.textContent = label;
      button.addEventListener("click", onClick);
      return button;
    }
    function detailGrid(fields) {
      const grid = document.createElement("div");
      grid.className = "detail-grid";
      fields.forEach(([label, value]) => {
        const labelEl = document.createElement("div");
        labelEl.className = "detail-label";
        labelEl.textContent = label;
        const valueEl = document.createElement("div");
        valueEl.className = "detail-value";
        valueEl.textContent = String(value ?? "-");
        grid.append(labelEl, valueEl);
      });
      return grid;
    }
    function showModal(title, body) {
      modalTitle.textContent = title;
      modalBody.textContent = "";
      modalBody.appendChild(body);
      modal.hidden = false;
    }
    function closeModal() {
      modal.hidden = true;
    }
    async function loadHealth() {
      const data = await request("/api/v1/health");
      document.querySelector("#healthStatus").textContent = data.status;
    }
    async function loadTrends() {
      const limit = document.querySelector("#trendLimit").value;
      const data = await request(`/api/v1/trends?limit=${encodeURIComponent(limit)}`);
      state.trends = data.topics || [];
      document.querySelector("#topicCount").textContent = state.trends.length;
      const rows = state.trends.map((t, i) => [
        i + 1,
        t.topic,
        Number(t.score).toFixed(2),
        trendBadge(t.direction),
        `${t.period_start} ~ ${t.period_end}`,
        actionButton("详情", () => showTopicDetail(t.topic))
      ]);
      setTable("#trendTable", ["#", "主题", "分数", "趋势", "周期", "操作"], rows);
      setTable("#hotTable", ["#", "主题", "分数", "趋势", "周期", "操作"], rows.slice(0, 10));
      renderBars();
    }
    function renderBars() {
      const max = Math.max(...state.trends.map(t => Number(t.score)), 1);
      const chart = document.querySelector("#barChart");
      chart.textContent = "";
      state.trends.slice(0, 8).forEach(t => {
        const width = Math.max(4, Number(t.score) / max * 100);
        const row = document.createElement("div");
        row.className = "bar-row";
        const label = document.createElement("div");
        label.textContent = t.topic;
        label.title = t.topic;
        const track = document.createElement("div");
        track.className = "bar-track";
        const fill = document.createElement("div");
        fill.className = "bar-fill";
        fill.style.width = `${width}%`;
        const score = document.createElement("div");
        score.textContent = Number(t.score).toFixed(1);
        track.appendChild(fill);
        row.append(label, track, score);
        chart.appendChild(row);
      });
    }
    async function loadItems() {
      const keyword = document.querySelector("#keyword").value.trim();
      const sourceId = document.querySelector("#sourceId").value.trim();
      const limit = document.querySelector("#itemLimit").value;
      const query = new URLSearchParams({ limit });
      if (keyword) query.set("keyword", keyword);
      if (sourceId) query.set("source_id", sourceId);
      const data = await request(`/api/v1/items?${query}`);
      state.items = data.items || [];
      document.querySelector("#itemCount").textContent = data.total || state.items.length;
      setTable("#itemTable", ["ID", "标题", "来源", "发布时间", "关键词", "质量", "操作"], state.items.map(item => [
        item.id,
        item.title,
        item.source_id,
        item.published_at,
        item.keywords,
        Number(item.quality_score).toFixed(1),
        actionButton("详情", () => showItemDetail(item.id))
      ]));
    }
    async function loadSources() {
      const data = await request("/api/v1/sources");
      state.sources = data.items || [];
      document.querySelector("#sourceCount").textContent = state.sources.length;
      setTable("#sourceTable", ["ID", "名称", "类型", "状态", "关键词", "操作"], state.sources.map(source => [
        source.id, source.name, source.source_type, source.status, source.keywords || "-",
        actionButton("采集", () => collectSource(source.id))
      ]));
    }
    async function collectSource(id) {
      const data = await request("/api/v1/tasks/collect", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ source_id: id })
      });
      showToast(`任务 ${data.id}：${data.task_status}，新增 ${data.success_count} 条`);
      await Promise.all([loadItems(), loadTrends()]);
    }
    async function showItemDetail(id) {
      const item = await request(`/api/v1/items/${encodeURIComponent(id)}`);
      const body = detailGrid([
        ["标题", item.title],
        ["正文", item.normalized_content || item.content],
        ["关键词", item.keywords],
        ["来源ID", item.source_id],
        ["URL", item.url],
        ["发布时间", item.published_at],
        ["质量分", Number(item.quality_score).toFixed(1)]
      ]);
      showModal(`信息详情 #${item.id}`, body);
    }
    async function showTopicDetail(topic) {
      const data = await request(`/api/v1/trends/${encodeURIComponent(topic)}`);
      const wrap = document.createElement("div");
      const trend = data.series && data.series[0];
      wrap.appendChild(detailGrid([
        ["主题", data.topic],
        ["分数", trend ? Number(trend.score).toFixed(2) : "-"],
        ["趋势", trend ? trend.direction : "-"],
        ["周期", trend ? `${trend.period_start} ~ ${trend.period_end}` : "-"]
      ]));
      const title = document.createElement("h2");
      title.textContent = "关联信息";
      wrap.appendChild(title);
      wrap.appendChild(buildTable(
        ["ID", "标题", "发布时间", "关键词", "质量"],
        (data.items || []).map(item => [
          item.id,
          item.title,
          item.published_at,
          item.keywords,
          Number(item.quality_score).toFixed(1)
        ])
      ));
      showModal("主题详情", wrap);
    }
    async function createSource() {
      const payload = {
        name: document.querySelector("#srcName").value || "演示数据源",
        type: document.querySelector("#srcType").value,
        endpoint: document.querySelector("#srcEndpoint").value || "https://example.com/demo",
        keywords: document.querySelector("#srcKeywords").value,
        schedule: document.querySelector("#srcSchedule").value,
        status: document.querySelector("#srcStatus").value
      };
      const data = await request("/api/v1/sources", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      showToast(`数据源已创建：${data.name}`);
      await loadSources();
    }
    async function loadReports() {
      const data = await request("/api/v1/reports");
      state.reports = data.items || [];
      setTable("#reportTable", ["ID", "名称", "类型", "格式", "生成人", "生成时间", "操作"], state.reports.map(report => [
        report.id,
        report.report_name,
        report.report_type,
        report.file_format,
        report.generated_by,
        report.generated_at,
        actionButton("下载", () => downloadReport(report))
      ]));
    }
    function downloadReport(report) {
      window.open(apiBase() + report.download_url, "_blank", "noopener");
    }
    async function createReport() {
      const data = await request("/api/v1/reports", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          report_type: document.querySelector("#reportType").value,
          format: document.querySelector("#reportFormat").value,
          generated_by: document.querySelector("#generatedBy").value || "组长"
        })
      });
      const result = document.querySelector("#reportResult");
      result.textContent = `${data.report_name} / ${data.file_path}`;
      const download = actionButton("下载", () => downloadReport(data));
      download.style.marginLeft = "8px";
      result.appendChild(download);
      showToast("报表文件已生成");
      await loadReports();
    }
    async function refreshAll() {
      try {
        await Promise.all([loadHealth(), loadSources(), loadItems(), loadTrends(), loadReports()]);
      } catch (error) {
        showToast(error.message);
      }
    }
    function activateView(view) {
      const button = document.querySelector(`nav button[data-view="${view}"]`);
      const panel = document.querySelector(`#${view}`);
      if (!button || !panel) return;
      document.querySelectorAll("nav button").forEach(item => item.classList.remove("active"));
      document.querySelectorAll(".view").forEach(item => item.classList.remove("active"));
      button.classList.add("active");
      panel.classList.add("active");
    }
    document.querySelectorAll("nav button").forEach(button => {
      button.addEventListener("click", () => activateView(button.dataset.view));
    });
    document.querySelector("#saveApi").addEventListener("click", () => {
      localStorage.setItem("apiBase", apiInput.value);
      refreshAll();
    });
    document.querySelector("#refreshAll").addEventListener("click", refreshAll);
    document.querySelector("#loadTrends").addEventListener("click", () => loadTrends().catch(e => showToast(e.message)));
    document.querySelector("#searchItems").addEventListener("click", () => loadItems().catch(e => showToast(e.message)));
    document.querySelector("#loadSources").addEventListener("click", () => loadSources().catch(e => showToast(e.message)));
    document.querySelector("#loadReports").addEventListener("click", () => loadReports().catch(e => showToast(e.message)));
    document.querySelector("#createSource").addEventListener("click", () => createSource().catch(e => showToast(e.message)));
    document.querySelector("#createReport").addEventListener("click", () => createReport().catch(e => showToast(e.message)));
    document.querySelector("#closeModal").addEventListener("click", closeModal);
    document.querySelector("[data-close-modal]").addEventListener("click", closeModal);
    activateView(new URLSearchParams(window.location.search).get("view") || "dashboard");
    refreshAll();
  </script>
</body>
</html>
